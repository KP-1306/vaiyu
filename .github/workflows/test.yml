name: Frontend Typecheck + Tests

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        # `npm ci` over-validates optionalDependencies in npm 10/11 — fails on
        # cross-platform esbuild 0.28 binaries (e.g. @esbuild/netbsd-arm64 on
        # linux-x64 runner) even though they're marked optional. `npm install`
        # respects the same lockfile but skips unsupported platforms cleanly.
        run: npm install --no-audit --no-fund --prefer-offline

      - name: Typecheck
        run: npm run typecheck

      - name: Tests
        run: npm run test
