name: Frontend Typecheck + Tests

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # Node 22 LTS has native WebSocket. @supabase/realtime-js 2.x errors
          # on Node <22 at SupabaseClient construction time, which breaks any
          # test that imports a service via lib/supabase.ts.
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        # `npm ci` over-validates optionalDependencies in npm 10/11 — fails on
        # cross-platform esbuild 0.28 binaries (e.g. @esbuild/netbsd-arm64 on
        # linux-x64 runner) even though they're marked optional. `npm install`
        # respects the same lockfile but skips unsupported platforms cleanly.
        run: npm install --no-audit --no-fund --prefer-offline

      - name: Typecheck
        run: npm run typecheck

      - name: Tests
        # Vitest loads `web/src/lib/supabase.ts` at module-init via service
        # imports, which throws if VITE_SUPABASE_URL / VITE_SUPABASE_PUBLISHABLE_KEY
        # are missing. The unit tests don't actually hit Supabase — they only
        # need the client to construct. Provide placeholder values that satisfy
        # the env check; CI does not (and should not) have real prod creds.
        env:
          VITE_SUPABASE_URL: http://127.0.0.1:54321
          VITE_SUPABASE_PUBLISHABLE_KEY: ci-placeholder-publishable-key
        run: npm run test
