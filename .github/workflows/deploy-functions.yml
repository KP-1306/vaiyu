name: Deploy Supabase Edge Functions

on:
  push:
    branches: ["main"]
    paths:
      - "supabase/functions/**"
      - ".github/workflows/deploy-functions.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-functions-${{ github.ref }}
  cancel-in-progress: true

env:
  SUPABASE_TELEMETRY_DISABLED: "1"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # Pinned to a known-good 2.x. The old pin (v1.187.8) had been failing every
      # run since ~May 2026: the 1.x `functions deploy` path is incompatible with
      # Supabase's current backend (fails regardless of code). 2.107.0 deploys all
      # current functions cleanly (verified locally) and matches the CLI used by the
      # RLS/RPC guard workflow.
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.107.0

      - name: Validate secrets & login
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then echo "::error::Missing SUPABASE_ACCESS_TOKEN"; exit 1; fi
          if [[ "$SUPABASE_ACCESS_TOKEN" != sbp_* ]]; then echo "::error::Token must start with sbp_"; exit 1; fi
          if [ -z "${SUPABASE_PROJECT_REF:-}" ]; then echo "::error::Missing SUPABASE_PROJECT_REF"; exit 1; fi
          supabase login --token "$SUPABASE_ACCESS_TOKEN"

      # Optional: quick sanity to catch syntax errors before deploy
      - name: Deno format & type check (soft fail)
        continue-on-error: true
        run: |
          set -euo pipefail
          deno --version || (curl -fsSL https://deno.land/x/install/install.sh | sh && echo "$HOME/.deno/bin" >> $GITHUB_PATH)
          deno fmt --check supabase/functions/**/*.ts
          deno check supabase/functions/**/*.ts || true

      - name: Deploy Edge Functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          set -euo pipefail

          # Deploy EVERY function present in supabase/functions/ (any directory with
          # an index.ts). We glob the directory instead of maintaining a hand-written
          # list so coverage is self-maintaining: a new function is deployed the
          # moment it lands on main, and nothing can silently drift out of CI (the
          # old list deployed only ~22 of 52 — incl. none of the razorpay fns).
          # _shared/ has no index.ts, so it is skipped automatically.
          #
          # Flags:
          #   --use-api        server-side bundling. The default bundler shells out
          #                    to Docker, which the CI runner doesn't provide → the
          #                    deploy step exited 127 (docker: command not found) on
          #                    every run since ~May 2026.
          #   --no-verify-jwt  matches the current prod posture for ALL functions:
          #                    each does its own auth via _shared/auth.ts, and the
          #                    public/webhook fns are anon by design. Every function
          #                    is already deployed this way — globbing is a coverage
          #                    change, NOT an auth/behaviour change. (config.toml's
          #                    per-fn verify_jwt=false blocks stay consistent with it.)
          #
          # Strict: we attempt all functions, then fail the job if ANY failed (so one
          # failure surfaces every other failure in the same run rather than masking).
          echo "Project: $SUPABASE_PROJECT_REF"
          echo "supabase CLI: $(supabase --version)"

          deployed=0
          failed=()
          for dir in supabase/functions/*/; do
            fn="$(basename "$dir")"
            [ -f "${dir}index.ts" ] || continue   # skip _shared and any non-function dir
            echo "→ Deploying $fn"
            if supabase functions deploy "$fn" \
                 --project-ref "$SUPABASE_PROJECT_REF" \
                 --no-verify-jwt --use-api; then
              deployed=$((deployed + 1))
            else
              echo "::error::Failed to deploy $fn"
              failed+=("$fn")
            fi
          done

          echo "Deployed ${deployed} function(s)."
          if [ "${#failed[@]}" -gt 0 ]; then
            echo "::error::${#failed[@]} function(s) failed to deploy: ${failed[*]}"
            exit 1
          fi

      - name: Summary
        run: echo "✅ Supabase Edge Functions deployed to ${{ secrets.SUPABASE_PROJECT_REF }}"
