<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanks — VAiyu</title>
    <style>
        body { font-family: sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #f9fafb; color: #111827; }
        .card { max-width: 400px; padding: 2rem; background: white; border-radius: 0.75rem; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); text-align: center; }
        h1 { margin-top: 0; font-size: 1.5rem; }
        p { color: #4b5563; line-height: 1.5; }
        a { display: inline-block; margin-top: 1.5rem; padding: 0.5rem 1rem; background: #145af2; color: white; text-decoration: none; border-radius: 0.5rem; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Thanks — we’ll be in touch.</h1>
        <p>Your request has been received. We usually reply within one business day.</p>
        <a href="/">Back to home</a>
    </div>

    <!-- Hidden form for Netlify detection -->
    <form name="lead" netlify netlify-honeypot="bot-field" hidden>
        <input type="text" name="name" />
        <input type="email" name="email" />
        <input type="text" name="company" />
        <input type="text" name="subject" />
        <textarea name="message"></textarea>
    </form>
</body>
</html>
