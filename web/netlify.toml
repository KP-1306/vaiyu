[build]
  command = "npm run build"
  publish = "dist"
  # Node 22 LTS. Matches .nvmrc + .github/workflows/test.yml so local /
  # CI / Netlify builds all run on the same major.
  environment = { NODE_VERSION = "22" }

[functions]
  directory = "functions"      # => web/functions
  node_bundler = "esbuild"

# ---------- Security Headers (all routes)
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Permissions-Policy: allow payment API for self + Razorpay's checkout
    # origin (some Razorpay flows use the Payment Request API for UPI/cards).
    Permissions-Policy = "geolocation=(), microphone=(), payment=(self \"https://checkout.razorpay.com\"), camera=(self)"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    # CSP: frame-src lists the origins our pages are allowed to embed via
    # <iframe>. Razorpay's Checkout popup iframes both api.razorpay.com
    # (for the OTP/payment form) and various bank/UPI/wallet origins via
    # *.razorpay.com. Without this, default-src 'self' is used as a fallback
    # and every Razorpay iframe is blocked → "Framing 'https://api.razorpay.com/'
    # violates Content Security Policy" in the console.
    # img-src includes blob: so URL.createObjectURL(file) previews work for
    # the KYC ID-upload flow (Aadhaar front/back, etc.). Without it Chrome
    # blocks the blob:https://.../<uuid> URL the preview <img src> uses with
    # "violates the following Content Security Policy directive: img-src".
    Content-Security-Policy = "default-src 'self'; connect-src 'self' https: wss:; img-src 'self' data: blob: https:; script-src 'self' 'unsafe-inline' https:; style-src 'self' 'unsafe-inline' https:; font-src 'self' data: https:; frame-src 'self' https://api.razorpay.com https://checkout.razorpay.com https://*.razorpay.com; frame-ancestors 'self'; base-uri 'self'"

# ---------- Old links → new flow
[[redirects]]
  from = "/welcome"
  to = "/guest"
  status = 301
  force = true

# ---------- Observability proxy (MORE SPECIFIC; must come before /api/*)
[[redirects]]
  from = "/api/obs/*"
  to = "/.netlify/functions/obs/:splat"
  status = 200

# ---------- Platform Operator Console data API (MORE SPECIFIC; before /api/*)
[[redirects]]
  from = "/api/admin/*"
  to = "/.netlify/functions/admin-metrics/:splat"
  status = 200

# ---------- API reverse proxy (generic)
[[redirects]]
  from = "/api/*"
  to = "https://api.vaiyu.app/:splat"
  status = 200
  force = true

# ---------- Request tracker deep links (***key fix***)
# Any /requestTracker/<anything> should serve the SPA shell
[[redirects]]
  from = "/requestTracker/*"
  to = "/index.html"
  status = 200

# ---------- SPA fallback (deep links load index.html)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ---------- Long-term caching for static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/hero/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/illustrations/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/brand/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ---------- Service worker: fetch latest
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"
