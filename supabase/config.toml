project_id = "vsqiuwbmawygkxxjrxnt"

[auth]
site_url = "http://127.0.0.1:8080"
additional_redirect_urls = ["http://localhost:8080/*", "http://127.0.0.1:8080/*"]

[functions]

[functions.process-import-rows]
verify_jwt = false

[functions.send-notifications]
verify_jwt = false

[functions.generate-reminders]
verify_jwt = false

# Razorpay webhook receives unauthenticated POSTs from Razorpay servers and
# verifies them by HMAC signature against RAZORPAY_WEBHOOK_SECRET. Razorpay
# does not (cannot) send a Supabase JWT.
[functions.razorpay-webhook]
verify_jwt = false

# DIRECT-mode webhook receiver — same rationale as razorpay-webhook above.
# Multi-hotel routing happens via notes.hotel_id in the payload; HMAC is
# verified against each hotel's per-hotel webhook secret.
[functions.razorpay-direct-webhook]
verify_jwt = false

# Day 11 — public lead capture for hotel website enquiry forms.
# No JWT required; relies on rate-limiting via api_hits + create_lead_public
# RPC's SECURITY DEFINER + source/hotel validation. CORS open by design.
[functions.leads-public-capture]
verify_jwt = false

# Resend → Vaiyu webhook (bounce/complaint/delivered events). Verified by
# Svix signature using RESEND_WEBHOOK_SECRET. Drives drip auto-pause on
# bounce — see migration 20260526000009.
[functions.resend-webhook]
verify_jwt = false

# Inbound chat (WhatsApp Meta callback). Already used as a stub; now also
# pauses active drip subscriptions when a lead replies. No JWT — Meta uses
# its own signed callback (verification token configured in dashboard).
[functions.chat-inbound]
verify_jwt = false

# Position 5 — anon view tracker for the public package landing page.
# Rate-limited via api_hits (1/min dedup per IP+package). Raw IP never stored;
# only sha256(ip + PACKAGE_VIEW_IP_SALT + UTC date).
[functions.packages-track-view]
verify_jwt = false

# Interakt webhook — receives delivery receipts + inbound WhatsApp messages.
# No JWT (Interakt's HTTP callback). Verified by HMAC-SHA256 against
# INTERAKT_WEBHOOK_SECRET. Returns 200 on signature failure to avoid hint
# leakage but logs and refuses to process.
[functions.interakt-webhook]
verify_jwt = false

# Phase C (API-key migration): these two are invoked by pg_cron with a service
# credential in the Authorization header. With the new sb_secret_ keys the gateway
# can't JWT-verify that bearer, so verify_jwt must be off and they authorize the
# caller in-code via isServiceToken() (exact sb_secret_ match). ACTIVATE ONLY
# together with Vault service_role_key → new sb_secret_ (see
# docs/supabase-api-key-migration.md), else they 403.
[functions.admin-alerts]
verify_jwt = false

[functions.cleanup-guest-documents]
verify_jwt = false
